<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yosemite Trip — Activity Vote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --border: #e0dbd3;
    --text: #1a1814;
    --muted: #8a8278;
    --green: #2d6a4f;
    --green-bg: #d8f3dc;
    --red: #9b2335;
    --red-bg: #fde8eb;
    --amber: #92400e;
    --amber-bg: #fef3c7;
    --accent: #c17a3a;
    --accent-dark: #9e5f24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── WELCOME SCREEN ── */
  #welcome-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .welcome-card .emoji { font-size: 2.5rem; margin-bottom: 1rem; }

  .welcome-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .welcome-card p {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .input-group { margin-bottom: 1rem; text-align: left; }
  .input-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px; display: block; }

  input[type=text], select {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus, select:focus { border-color: var(--accent); }

  .start-btn {
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.15s;
  }

  .start-btn:hover { opacity: 0.85; }
  .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 8px; }

  /* ── MAIN VOTING APP ── */
  #app-screen { display: none; }

  header {
    background: var(--text);
    color: white;
    padding: 1.25rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    font-weight: 400;
  }

  header .user-info {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .switch-btn {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .summary-bar {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.75); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: #4ade80; }
  .dot-red { background: #f87171; }
  .dot-amber { background: #fbbf24; }

  .save-status {
    margin-left: auto;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    font-style: italic;
  }

  main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .section-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2rem 0 0.75rem;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 0.2s, border-left 0.2s;
  }

  .card.yes { border-color: var(--green); border-left: 4px solid var(--green); }
  .card.no { border-color: #e5a0a8; border-left: 4px solid var(--red); opacity: 0.6; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 3px;
  }

  .card-name { font-size: 0.92rem; font-weight: 600; flex: 1; line-height: 1.3; }

  .suggested {
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-meta { font-size: 0.76rem; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }

  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }

  .tag {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .tag-nn { background: var(--green-bg); color: var(--green); }
  .tag-easy { background: var(--green-bg); color: var(--green); }
  .tag-mod { background: var(--amber-bg); color: var(--amber); }
  .tag-hard { background: var(--red-bg); color: var(--red); }

  .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }

  .vote-btn {
    flex: 1;
    padding: 7px 0;
    font-size: 0.82rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .vote-btn:hover { border-color: var(--text); color: var(--text); }
  .vote-btn.active-yes { background: var(--green-bg); color: var(--green); border-color: var(--green); font-weight: 600; }
  .vote-btn.active-no { background: var(--red-bg); color: var(--red); border-color: var(--red); font-weight: 600; }

  .field-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .field { flex: 1; }
  .field-label { font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 3px; }

  select.small {
    font-size: 0.78rem;
    padding: 5px 6px;
    border-radius: 6px;
  }

  textarea {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    resize: none;
    min-height: 28px;
    overflow: hidden;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }

  /* votes from others */
  .other-votes {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .other-vote-pill {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .pill-yes { background: var(--green-bg); color: var(--green); }
  .pill-no { background: var(--red-bg); color: var(--red); }

  /* floating submit */
  .fab {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(193,122,58,0.4);
    transition: opacity 0.15s, transform 0.15s;
    z-index: 99;
  }

  .fab:hover { opacity: 0.9; transform: translateY(-1px); }
  .fab:active { transform: translateY(0); }

  /* toast */
  .toast {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* loading */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="welcome-screen">
  <div class="welcome-card">
    <div class="emoji">🏔️</div>
    <h1>Yosemite Trip</h1>
    <p>Vote on activities for June 6–16 at Club Wyndham Angels Camp. Enter your name to get started — you can update your votes anytime.</p>

    <div class="input-group">
      <label class="input-label" for="voter-name">Your name</label>
      <input type="text" id="voter-name" placeholder="First and last name" autocomplete="name" />
    </div>

    <div class="input-group">
      <label class="input-label" for="voter-group">Your group</label>
      <select id="voter-group">
        <option value="">Select your group...</option>
        <option value="Frenzels">Frenzels</option>
        <option value="Simmons">Simmons (Jun 6–10)</option>
        <option value="Barrus">Barrus (Jun 10–13)</option>
      </select>
    </div>

    <button class="start-btn" onclick="startVoting()">Start Voting →</button>
    <div id="welcome-error" class="error-msg"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header>
    <div class="header-top">
      <div>
        <h1>Yosemite Activity Vote</h1>
        <div class="user-info" id="user-display"></div>
      </div>
      <button class="switch-btn" onclick="switchUser()">Switch user</button>
    </div>
    <div class="summary-bar">
      <div class="stat"><span class="dot dot-green"></span><span id="yes-count">0</span> yes</div>
      <div class="stat"><span class="dot dot-red"></span><span id="no-count">0</span> no</div>
      <div class="stat"><span class="dot dot-amber"></span><span id="pending-count">0</span> pending</div>
      <div class="save-status" id="save-status"></div>
    </div>
  </header>

  <main id="main-content">
    <div class="loading">Loading activities...</div>
  </main>

  <button class="fab" onclick="submitAll()">💾 Save All Votes</button>
  <div class="toast" id="toast"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynDslND48JzPQi_s5NrxCPJWlpwnZT3Y76UZ5aTwtIsyK9u56PwUO2iScsfHrMEYWI/exec';

const DAYS = ['Select day...','Sat · Jun 6','Sun · Jun 7','Mon · Jun 8','Tue · Jun 9','Wed · Jun 10','Thu · Jun 11','Fri · Jun 12','Sat · Jun 13','Sun · Jun 14','Mon · Jun 15','Tue · Jun 16'];
const GROUPS = ['Select group...','All groups','Frenzels','Simmons','Barrus','Frenzels + Simmons','Frenzels + Barrus'];

const SECTIONS = [
  { label: 'Whole Group', items: [
    { id:'grp-dinner', name:'Group dinner night — Murphys', meta:'20 min · $20–40/person · Only full overlap day', day:'Wed · Jun 10', grp:'All groups' }
  ]},
  { label: 'Day Hikes — Local', items: [
    { id:'natural-bridges', name:'Natural Bridges Trail', tags:['easy–mod'], meta:'10 min · 2.1 mi · Free · Cave swim, gets wet', day:'Mon · Jun 9' },
    { id:'carson-creek', name:'Carson Creek Trail Loop', tags:['easy'], meta:'15 min · 4 mi · Free · Lake views, all fitness', day:'Sun · Jun 7' },
    { id:'angels-creek', name:'Angels Creek Trail', tags:['easy'], meta:'15 min · 3.4 mi · Free · Serene, dog friendly', day:'Sun · Jun 7' },
    { id:'mineshaft', name:'Mineshaft Trail — Murphys', tags:['easy–mod'], meta:'20 min · 2.8 mi · Free · Old mining road', day:'Mon · Jun 9' },
    { id:'big-trees-north', name:'Calaveras Big Trees — North Grove', tags:['easy'], meta:'35 min · 2 mi · ~$10/car · Flat, all ages', day:'Thu · Jun 11' },
    { id:'big-trees-south', name:'Calaveras Big Trees — South Grove', tags:['moderate'], meta:'35 min · 5+ mi · ~$10/car · More workout', day:'Thu · Jun 11' },
    { id:'pinecrest', name:'Pinecrest Lake Loop', tags:['moderate'], meta:'60 min · 6+ mi · Free · Lake, waterfall, swim hole', day:'Fri · Jun 12' },
    { id:'arnold-rim', name:'Arnold Rim Trail', tags:['hard'], meta:'26 min · 3.1 mi · Free · 450ft gain, serious hikers', day:'Fri · Jun 12' }
  ]},
  { label: 'Day Hikes — Yosemite (2 hrs)', items: [
    { id:'cooks-meadow', name:"Cook's Meadow Loop", tags:['easy'], meta:'2 hrs · 1 mi · Free · Stroller friendly, iconic views', day:'Sat · Jun 7' },
    { id:'mirror-lake', name:'Mirror Lake', tags:['easy'], meta:'2 hrs · 2–5 mi · Free · Kids can splash and swim', day:'Sat · Jun 7' },
    { id:'sentinel-dome', name:'Sentinel Dome + Taft Point', tags:['easy–mod'], meta:'2 hrs · 2.2 mi each · Free · Epic views', day:'Mon · Jun 9' },
    { id:'vernal-falls', name:'Vernal Falls — Mist Trail', tags:['moderate'], meta:'2 hrs · 3 mi · Free · Steep, assess kids first', day:'Mon · Jun 9' },
    { id:'glacier-point', name:'Four Mile Trail to Glacier Point', tags:['hard'], meta:'2 hrs · 10 mi RT · Free · 3,400ft gain', day:'Fri · Jun 12' }
  ]},
  { label: 'Kids', items: [
    { id:'gold-panning', name:'Gold panning — Angels Camp Museum', meta:'5 min · ~$10–15/kid', day:'Sun · Jun 8' },
    { id:'gem-mining', name:'Gem mining flume — Moaning Cavern', meta:'10 min · ~$10–15/kid', day:'Sun · Jun 8' },
    { id:'angels-museum', name:'Angels Camp Museum', meta:'5 min · $10/kid · Gold Rush history, frog jump', day:'Sun · Jun 8' },
    { id:'climbing-tower', name:'Climbing tower — Moaning Cavern', meta:'10 min · ~$10/kid · ⚠ Verify open', day:'Sun · Jun 8' },
    { id:'kids-rafting', name:'Little kids rafting', tags:['non-negotiable'], meta:'2 hrs · ~$30/person · Book in person Curry Village', day:'Tue · Jun 9' }
  ]},
  { label: 'Adults', items: [
    { id:'big-rafting', name:'Big kids rafting', tags:['non-negotiable'], meta:'2 hrs · $123–168/person · Book Sierra Mac or ARTA', day:'Fri · Jun 13' },
    { id:'axe-throwing', name:'Axe throwing — Moaning Cavern', meta:'10 min · $20/lane · Ages 12+', day:'Sun · Jun 8' },
    { id:'fishing', name:'New Melones Lake fishing', meta:'15 min · ~$20–30 + license', day:'Thu · Jun 12' },
    { id:'mercer-caverns', name:'Mercer Caverns tour', meta:'20 min · ~$20/adult', day:'Tue · Jun 10' },
    { id:'stanislaus', name:'Stanislaus National Forest', meta:'30 min · Free · Hiking, biking, backpacking', day:'Thu · Jun 12' },
    { id:'ironstone', name:'Ironstone Vineyards', meta:'20 min · $15 tasting · For you only 🍷', day:'Tue · Jun 10' }
  ]},
  { label: 'Everyone', items: [
    { id:'moaning-cavern', name:'Moaning Cavern tour', meta:'10 min · $14/adult $7/kid · Largest cave in CA', day:'Sun · Jun 8' },
    { id:'redwood-forest', name:'Calaveras Big Trees — Redwood Forest day', tags:['non-negotiable'], meta:'35 min · ~$10/car · Simmons joins before departing', day:'Wed · Jun 10', grp:'All groups' },
    { id:'melones-swim', name:'New Melones Lake — swim/kayak', meta:'15 min · ~$20–30 · 12,500 acre lake', day:'Mon · Jun 9' },
    { id:'murphys-evening', name:'Murphys downtown evening', meta:'20 min · Free · Pair with group dinner', day:'Wed · Jun 10', grp:'All groups' },
    { id:'disc-golf', name:'Disc golf — Murphys', meta:'20 min · Free · All ages', day:'Mon · Jun 9' },
    { id:'yosemite-bike', name:'Bike Yosemite Valley', meta:'2 hrs · ~$65/day rental · Flat, all ages', day:'Sat · Jun 7' },
    { id:'el-capitan', name:'El Capitan viewpoint', meta:'2 hrs · Free · No hiking needed', day:'Sat · Jun 7' }
  ]}
];

var currentUser = { name: '', group: '' };
var allVotes = {}; // keyed by activity id → { vote, day, confirmedBy, comments }
var otherVotes = {}; // keyed by activity id → array of { name, vote }

function startVoting() {
  var name = document.getElementById('voter-name').value.trim();
  var group = document.getElementById('voter-group').value;
  var err = document.getElementById('welcome-error');

  if (!name) { err.textContent = 'Please enter your name.'; return; }
  if (!group) { err.textContent = 'Please select your group.'; return; }

  currentUser = { name: name, group: group };
  err.textContent = '';

  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-display').textContent = name + ' · ' + group;

  loadVotes();
}

function switchUser() {
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('voter-name').value = '';
  document.getElementById('voter-group').value = '';
  currentUser = { name: '', group: '' };
  allVotes = {};
  otherVotes = {};
}

function loadVotes() {
  setSaveStatus('Loading votes...');
  fetch(SCRIPT_URL + '?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var myName = currentUser.name.trim().toLowerCase();
      otherVotes = {};
      allVotes = {};
      (data.votes || []).forEach(function(v) {
        var isMe = v.name.trim().toLowerCase() === myName;
        if (isMe) {
          allVotes[v.activity] = { vote: v.vote, day: v.day, confirmedBy: v.confirmedBy, comments: v.comments };
        } else {
          if (!otherVotes[v.activity]) otherVotes[v.activity] = [];
          otherVotes[v.activity].push({ name: v.name, vote: v.vote });
        }
      });
      renderApp();
      setSaveStatus('');
    })
    .catch(function() {
      renderApp();
      setSaveStatus('');
    });
}

function tagClass(t) {
  if (t === 'non-negotiable') return 'tag-nn';
  if (t === 'easy' || t === 'easy–mod') return 'tag-easy';
  if (t === 'moderate') return 'tag-mod';
  if (t === 'hard') return 'tag-hard';
  return '';
}

function makeSelect(opts, def, cls, onchange) {
  return '<select class="' + cls + '" onchange="' + onchange + '">' +
    opts.map(function(o) { return '<option' + (o === def ? ' selected' : '') + '>' + o + '</option>'; }).join('') +
    '</select>';
}

function renderApp() {
  var html = '';

  SECTIONS.forEach(function(sec) {
    html += '<div class="section-label">' + sec.label + '</div>';
    sec.items.forEach(function(item) {
      var saved = allVotes[item.id] || {};
      var vote = saved.vote || '';
      var day = saved.day || item.day;
      var confirmedBy = saved.confirmedBy || (item.grp || '');
      var comments = saved.comments || '';
      var cardClass = 'card' + (vote === 'yes' ? ' yes' : vote === 'no' ? ' no' : '');

      html += '<div class="' + cardClass + '" id="card-' + item.id + '">';
      html += '<div class="card-top"><span class="card-name">' + item.name + '</span><span class="suggested">' + item.day + '</span></div>';

      if (item.tags && item.tags.length) {
        html += '<div class="tags">' + item.tags.map(function(t) {
          return '<span class="tag ' + tagClass(t) + '">' + t + '</span>';
        }).join('') + '</div>';
      }

      html += '<div class="card-meta">' + item.meta + '</div>';

      html += '<div class="btn-row">';
      html += '<button class="vote-btn' + (vote === 'yes' ? ' active-yes' : '') + '" onclick="castVote(\'' + item.id + '\',\'yes\',this)">✓ Yes</button>';
      html += '<button class="vote-btn' + (vote === 'no' ? ' active-no' : '') + '" onclick="castVote(\'' + item.id + '\',\'no\',this)">✕ No</button>';
      html += '</div>';

      html += '<div class="field-row">';
      html += '<div class="field"><div class="field-label">Confirmed day</div>' + makeSelect(DAYS, day, 'small', 'updateField(\'' + item.id + '\',\'day\',this.value)') + '</div>';
      html += '<div class="field"><div class="field-label">Confirmed by</div>' + makeSelect(GROUPS, confirmedBy, 'small', 'updateField(\'' + item.id + '\',\'confirmedBy\',this.value)') + '</div>';
      html += '</div>';

      html += '<textarea placeholder="Comments..." oninput="updateField(\'' + item.id + '\',\'comments\',this.value);this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">' + comments + '</textarea>';

      // Show other people's votes
      var others = otherVotes[item.id];
      if (others && others.length) {
        html += '<div class="other-votes">';
        others.forEach(function(o) {
          var pillClass = o.vote === 'yes' ? 'pill-yes' : 'pill-no';
          var icon = o.vote === 'yes' ? '✓' : '✕';
          html += '<span class="other-vote-pill ' + pillClass + '">' + icon + ' ' + o.name + '</span>';
        });
        html += '</div>';
      }

      html += '</div>';
    });
  });

  document.getElementById('main-content').innerHTML = html;
  updateSummary();
}

function castVote(id, v, btn) {
  var card = document.getElementById('card-' + id);
  var btns = card.querySelectorAll('.vote-btn');
  var already = (allVotes[id] || {}).vote === v;

  if (!allVotes[id]) allVotes[id] = {};

  if (already) {
    allVotes[id].vote = '';
    card.classList.remove('yes', 'no');
    btns.forEach(function(b) { b.classList.remove('active-yes', 'active-no'); });
  } else {
    allVotes[id].vote = v;
    card.classList.remove('yes', 'no');
    card.classList.add(v);
    btns.forEach(function(b) { b.classList.remove('active-yes', 'active-no'); });
    btn.classList.add(v === 'yes' ? 'active-yes' : 'active-no');
  }

  updateSummary();
}

function updateField(id, field, value) {
  if (!allVotes[id]) allVotes[id] = {};
  allVotes[id][field] = value;
}

function updateSummary() {
  var total = 0, yes = 0, no = 0;
  SECTIONS.forEach(function(sec) {
    sec.items.forEach(function(item) {
      total++;
      var v = (allVotes[item.id] || {}).vote;
      if (v === 'yes') yes++;
      else if (v === 'no') no++;
    });
  });
  document.getElementById('yes-count').textContent = yes;
  document.getElementById('no-count').textContent = no;
  document.getElementById('pending-count').textContent = total - yes - no;
}

function setSaveStatus(msg) {
  document.getElementById('save-status').textContent = msg;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function submitAll() {
  setSaveStatus('Saving...');
  var votes = [];

  SECTIONS.forEach(function(sec) {
    sec.items.forEach(function(item) {
      var saved = allVotes[item.id] || {};
      if (!saved.vote) return;
      votes.push({
        name: currentUser.name,
        group: currentUser.group,
        activity: item.id,
        vote: saved.vote || '',
        day: saved.day || item.day,
        confirmedBy: saved.confirmedBy || '',
        comments: saved.comments || ''
      });
    });
  });

  if (votes.length === 0) {
    showToast('No votes to save yet!');
    setSaveStatus('');
    return;
  }

  // Bundle all votes and POST via iframe to avoid CORS
  var iframe = document.getElementById('hidden-iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.name = 'hidden-iframe';
    iframe.id = 'hidden-iframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }

  var form = document.createElement('form');
  form.method = 'POST';
  form.action = SCRIPT_URL;
  form.target = 'hidden-iframe';
  form.style.display = 'none';

  var input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'payload';
  input.value = JSON.stringify({votes: votes});
  form.appendChild(input);
  document.body.appendChild(form);

  iframe.onload = function() {
    setSaveStatus('Saved');
    showToast('Votes saved!');
    setTimeout(function() { loadVotes(); }, 1500);
  };

  form.submit();
  document.body.removeChild(form);
}
</script>
</body>
</html>
