<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yosemite Trip — Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --border: #e0dbd3;
    --text: #1a1814;
    --muted: #8a8278;
    --green: #2d6a4f;
    --green-bg: #d8f3dc;
    --red: #9b2335;
    --red-bg: #fde8eb;
    --amber: #92400e;
    --amber-bg: #fef3c7;
    --accent: #c17a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* WELCOME */
  #welcome-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .welcome-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .welcome-card .emoji { font-size: 2.5rem; margin-bottom: 1rem; }
  .welcome-card h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
  .welcome-card p { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .input-group { margin-bottom: 1rem; text-align: left; }
  .input-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px; display: block; }
  input[type=text], select { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  .start-btn { width: 100%; padding: 12px; background: var(--text); color: white; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
  .start-btn:hover { opacity: 0.85; }
  .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 8px; }

  /* APP */
  #app-screen { display: none; }

  header { background: var(--text); color: white; padding: 1.25rem 1.5rem; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
  header .user-info { font-size: 0.78rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .switch-btn { font-size: 0.75rem; color: rgba(255,255,255,0.6); background: none; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .tab-bar { display: flex; gap: 0; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 3px; margin-top: 0.75rem; }
  .tab-btn { flex: 1; padding: 6px 0; font-size: 0.8rem; font-weight: 500; font-family: 'DM Sans', sans-serif; border: none; border-radius: 6px; background: transparent; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; }
  .tab-btn.active { background: white; color: var(--text); font-weight: 600; }

  main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

  /* SCHEDULE CARDS */
  .intro-note { background: #fef9f0; border: 1px solid #f0d9b5; border-radius: 10px; padding: 12px 14px; margin-bottom: 1.5rem; font-size: 0.83rem; line-height: 1.6; color: #7a5c2e; }
  .intro-note strong { display: block; margin-bottom: 4px; }

  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
  .day-card.ok { border-color: var(--green); border-left: 4px solid var(--green); }
  .day-card.conflict { border-color: var(--red); border-left: 4px solid var(--red); }
  .day-card.change { border-color: var(--amber); border-left: 4px solid var(--amber); }

  .day-card-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
  .day-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .day-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .day-subtitle { font-size: 0.72rem; color: var(--muted); font-style: italic; }
  .group-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .grp-pill { font-size: 0.65rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .pill-all { background: #e1f5ee; color: #0f6e56; }
  .pill-fren { background: #e6f1fb; color: #185fa5; }
  .pill-sim { background: #faeeda; color: #854f0b; }
  .pill-bar { background: #faece7; color: #993c1d; }

  .day-activities { padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 5px; }
  .activity-row { display: flex; gap: 8px; align-items: flex-start; }
  .activity-time { font-size: 0.7rem; color: var(--muted); min-width: 52px; padding-top: 2px; font-weight: 500; }
  .activity-body { flex: 1; }
  .activity-name { font-size: 0.82rem; color: var(--text); line-height: 1.4; font-weight: 500; }
  .activity-name .opt { font-size: 0.68rem; color: var(--muted); font-style: italic; margin-left: 4px; }
  .activity-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: var(--border); }
  .activity-detail { font-size: 0.75rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .activity-dist { font-size: 0.7rem; color: var(--accent); font-weight: 500; margin-top: 2px; }
  .activity-address { font-size: 0.7rem; color: var(--muted); margin-top: 1px; font-style: italic; }
  .activity-links { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .activity-link { font-size: 0.68rem; font-weight: 500; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); text-decoration: none; transition: background 0.15s; }
  .activity-link:hover { background: var(--border); }
  .activity-link.maps { border-color: #4285f4; color: #4285f4; }
  .activity-link.web { border-color: var(--accent); color: var(--accent); }

  .day-card-footer { padding: 10px 14px 12px; border-top: 1px solid var(--border); }

  .status-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .status-btn { flex: 1; padding: 7px 4px; font-size: 0.75rem; font-weight: 500; font-family: 'DM Sans', sans-serif; border-radius: 7px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.3; }
  .status-btn:hover { border-color: var(--text); color: var(--text); }
  .status-btn.active-ok { background: var(--green-bg); color: var(--green); border-color: var(--green); font-weight: 600; }
  .status-btn.active-conflict { background: var(--red-bg); color: var(--red); border-color: var(--red); font-weight: 600; }
  .status-btn.active-change { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); font-weight: 600; }

  textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; resize: none; min-height: 28px; overflow: hidden; line-height: 1.4; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }

  /* FAB */
  .fab { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--accent); color: white; border: none; border-radius: 50px; padding: 14px 22px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(193,122,58,0.4); transition: opacity 0.15s, transform 0.15s; z-index: 99; }
  .fab:hover { opacity: 0.9; transform: translateY(-1px); }

  .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .save-status { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-style: italic; margin-top: 4px; }

  /* DASHBOARD */
  #dash-content { display: none; background: #1a2e2a; min-height: calc(100vh - 120px); padding-bottom: 4rem; }
  .dash-hero { background: linear-gradient(160deg, #1a2e2a 0%, #0f1f1c 100%); padding: 1.5rem; border-bottom: 2px solid #2a9d8f; }
  .dash-hero-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: #f4e9d0; margin-bottom: 0.25rem; }
  .dash-hero-sub { font-size: 0.75rem; color: #7a9e96; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
  .dash-hero-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .dash-stat-pill { background: rgba(42,157,143,0.15); border: 1px solid rgba(42,157,143,0.3); border-radius: 20px; padding: 5px 14px; font-size: 0.78rem; color: #2a9d8f; font-weight: 600; }
  .dash-controls { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; border-bottom: 1px solid #3a5248; }
  .dash-updated { font-size: 0.72rem; color: #7a9e96; font-style: italic; }
  .dash-refresh-btn { font-size: 0.78rem; font-weight: 600; font-family: 'DM Sans', sans-serif; padding: 6px 14px; border-radius: 6px; border: 1px solid #3a5248; background: transparent; color: #2a9d8f; cursor: pointer; }
  .dash-inner { padding: 1.5rem 1rem; max-width: 700px; margin: 0 auto; }
  .dash-day-card { background: rgba(255,255,255,0.04); border: 1px solid #3a5248; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .dash-day-title { font-size: 0.9rem; font-weight: 600; color: #f4e9d0; margin-bottom: 10px; }
  .dash-counts { display: flex; gap: 10px; flex-wrap: wrap; }
  .dash-count { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
  .dash-count-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dash-count-label { color: #7a9e96; }
  .dash-count-num { font-weight: 700; color: #f4e9d0; }
  .dash-bar-track { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; margin-top: 8px; overflow: hidden; display: flex; gap: 2px; }
  .dash-bar-ok { height: 100%; background: #2a9d8f; border-radius: 3px; transition: width 0.6s ease; }
  .dash-bar-conflict { height: 100%; background: #c1440e; border-radius: 3px; transition: width 0.6s ease; }
  .dash-bar-change { height: 100%; background: #e9c46a; border-radius: 3px; transition: width 0.6s ease; }
  .dash-empty { text-align: center; padding: 3rem; color: #7a9e96; font-size: 0.9rem; }

  /* LOGISTICS TAB */
  #logistics-content { display: none; max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

  .logistics-intro { background: #fef9f0; border: 1px solid #f0d9b5; border-radius: 10px; padding: 12px 14px; margin-bottom: 1.5rem; font-size: 0.83rem; line-height: 1.6; color: #7a5c2e; }
  .logistics-intro strong { display: block; margin-bottom: 4px; }

  .logistics-group-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin: 2rem 0 0.75rem; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }

  .traveler-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 10px; overflow: hidden;
  }
  .traveler-card.mine { border-color: var(--accent); border-left: 4px solid var(--accent); }
  .traveler-card.confirmed { border-color: var(--green); border-left: 4px solid var(--green); }

  .traveler-header {
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .traveler-header:hover { background: var(--bg); }

  .traveler-name-row { display: flex; align-items: center; gap: 8px; }
  .traveler-name { font-size: 0.9rem; font-weight: 600; }
  .traveler-group-pill { font-size: 0.62rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
  .tpill-fren { background: #e6f1fb; color: #185fa5; }
  .tpill-sim { background: #faeeda; color: #854f0b; }
  .tpill-bar { background: #faece7; color: #993c1d; }

  .traveler-status-row { display: flex; align-items: center; gap: 6px; }
  .traveler-summary { font-size: 0.72rem; color: var(--muted); text-align: right; line-height: 1.4; }
  .traveler-chevron { font-size: 0.7rem; color: var(--muted); margin-left: 4px; transition: transform 0.2s; }
  .traveler-card.open .traveler-chevron { transform: rotate(180deg); }

  .traveler-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .traveler-card.open .traveler-body { display: block; }

  .log-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .log-field { display: flex; flex-direction: column; gap: 3px; }
  .log-field.full { grid-column: 1 / -1; }
  .log-label { font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .log-input { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; outline: none; transition: border-color 0.15s; width: 100%; }
  .log-input:focus { border-color: var(--accent); }
  .log-input[readonly] { opacity: 0.65; cursor: default; }
  .log-textarea { resize: none; min-height: 28px; overflow: hidden; line-height: 1.4; }

  .log-confirmed-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.7rem; font-weight: 600; color: var(--green);
    background: var(--green-bg); border: 1px solid var(--green); border-radius: 20px;
    padding: 2px 8px; margin-top: 8px;
  }

  .log-edit-btn {
    margin-top: 8px; font-size: 0.78rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; transition: opacity 0.15s;
  }
  .log-edit-btn:hover { opacity: 0.7; }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome-screen">
  <div class="welcome-card">
    <div class="emoji">🏕️</div>
    <h1>Yosemite Schedule</h1>
    <p>We've put together a day-by-day plan for the trip. Review each day and let us know if it works for you — takes about 2 minutes.</p>
    <div class="input-group">
      <label class="input-label" for="user-name">Your name</label>
      <input type="text" id="user-name" placeholder="First and last name" autocomplete="name" />
    </div>
    <div class="input-group">
      <label class="input-label" for="user-group">Your group</label>
      <select id="user-group">
        <option value="">Select your group...</option>
        <option value="Frenzels">Frenzels</option>
        <option value="Simmons">Simmons (Jun 6–10)</option>
        <option value="Barrus">Barrus (Jun 10–13)</option>
      </select>
    </div>
    <button class="start-btn" onclick="startApp()">Review Schedule →</button>
    <div id="welcome-error" class="error-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="header-top">
      <div>
        <h1>Yosemite Trip · Jun 6–13</h1>
        <div class="user-info" id="user-display"></div>
      </div>
      <button class="switch-btn" onclick="switchUser()">Switch</button>
    </div>
    <div class="save-status" id="save-status"></div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-sched" onclick="switchTab('schedule')">📅 Schedule</button>
      <button class="tab-btn" id="tab-dash" onclick="switchTab('dashboard')">📊 Responses</button>
      <button class="tab-btn" id="tab-log" onclick="switchTab('logistics')">🚗 Logistics</button>
    </div>
  </header>

  <main id="main-content"></main>

  <div id="dash-content">
    <div class="dash-hero">
      <div class="dash-hero-title">📊 Schedule Responses</div>
      <div class="dash-hero-sub">Jun 6–13 · Angels Camp, CA</div>
      <div class="dash-hero-stats" id="dash-stats"></div>
    </div>
    <div class="dash-controls">
      <span class="dash-updated" id="dash-updated">Click refresh to load</span>
      <button class="dash-refresh-btn" onclick="loadDashboard()">⟳ Refresh</button>
    </div>
    <div class="dash-inner" id="dash-inner"><div class="dash-empty">Click Refresh to load responses</div></div>
  </div>

  <button class="fab" id="save-fab" onclick="submitAll()">💾 Save Responses</button>
  <button class="fab" id="log-fab" style="display:none" onclick="submitLogistics()">💾 Save My Info</button>
  <div class="toast" id="toast"></div>

  <div id="logistics-content"></div>
</div>

var currentUser = { name: '', group: '' };
var responses = {}; // keyed by day id → { status, comments }

function startApp() {
  var name = document.getElementById('user-name').value.trim();
  var group = document.getElementById('user-group').value;
  var err = document.getElementById('welcome-error');
  if (!name) { err.textContent = 'Please enter your name.'; return; }
  if (!group) { err.textContent = 'Please select your group.'; return; }
  currentUser = { name: name, group: group };
  err.textContent = '';
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-display').textContent = name + ' · ' + group;
  loadResponses();
}

function switchUser() {
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('user-name').value = '';
  document.getElementById('user-group').value = '';
  currentUser = { name: '', group: '' };
  responses = {};
}

function loadResponses() {
  setSaveStatus('Loading...');
  var cb = 'schedCb_' + Date.now();
  var script = document.createElement('script');
  window[cb] = function(data) {
    delete window[cb];
    try { document.body.removeChild(script); } catch(e) {}
    var myName = currentUser.name.trim().toLowerCase();
    responses = {};
    (data.responses || []).forEach(function(r) {
      if (r.name.trim().toLowerCase() === myName) {
        responses[r.day] = { status: r.status, comments: r.comments };
      }
    });
    renderSchedule();
    setSaveStatus('');
  };
  script.onerror = function() {
    delete window[cb];
    try { document.body.removeChild(script); } catch(e) {}
    renderSchedule();
    setSaveStatus('');
  };
  script.src = SCRIPT_URL + '?type=schedule&callback=' + cb + '&t=' + Date.now();
  document.body.appendChild(script);
}

function groupPills(groups) {
  return groups.map(function(g) {
    if (g === 'all') return '<span class="grp-pill pill-all">All groups</span>';
    if (g === 'fren') return '<span class="grp-pill pill-fren">Frenzels</span>';
    if (g === 'sim') return '<span class="grp-pill pill-sim">Simmons</span>';
    if (g === 'bar') return '<span class="grp-pill pill-bar">Barrus</span>';
    return '';
  }).join('');
}

function renderSchedule() {
  var html = '<div class="intro-note"><strong>Review the plan 👋</strong>Let us know how each day looks for you. Leave a comment if something needs to change — we\'ll sort it out before the trip!</div>';

  SCHEDULE.forEach(function(day) {
    var saved = responses[day.id] || {};
    var status = saved.status || '';
    var comments = saved.comments || '';
    var cardClass = 'day-card' + (status === 'ok' ? ' ok' : status === 'conflict' ? ' conflict' : status === 'change' ? ' change' : '');

    html += '<div class="' + cardClass + '" id="day-' + day.id + '">';

    // Header
    html += '<div class="day-card-header">';
    html += '<div class="day-title-row">';
    html += '<div><div class="day-title">' + day.date + '</div><div class="day-subtitle">' + day.subtitle + '</div></div>';
    html += '<div class="group-pills">' + groupPills(day.groups) + '</div>';
    html += '</div></div>';

    // Activities
    html += '<div class="day-activities">';
    day.activities.forEach(function(a) {
      html += '<div class="activity-row">';
      html += '<div class="activity-time">' + a.time + '</div>';
      html += '<div class="activity-dot"></div>';
      html += '<div class="activity-body">';
      html += '<div class="activity-name">' + a.name + (a.opt ? ' <span class="opt">(optional)</span>' : '') + '</div>';
      if (a.detail) html += '<div class="activity-detail">' + a.detail + '</div>';
      if (a.dist) html += '<div class="activity-dist">📍 ' + a.dist + ' from camp</div>';
      if (a.address) html += '<div class="activity-address">' + a.address + '</div>';
      if (a.maps || a.web) {
        html += '<div class="activity-links">';
        if (a.maps) html += '<a class="activity-link maps" href="' + a.maps + '" target="_blank">🗺 Maps</a>';
        if (a.web) html += '<a class="activity-link web" href="' + a.web + '" target="_blank">🔗 Website</a>';
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Footer
    html += '<div class="day-card-footer">';
    html += '<div class="status-row">';
    html += '<button class="status-btn' + (status === 'ok' ? ' active-ok' : '') + '" onclick="setStatus(\'' + day.id + '\',\'ok\',this)">✓ Works for me</button>';
    html += '<button class="status-btn' + (status === 'conflict' ? ' active-conflict' : '') + '" onclick="setStatus(\'' + day.id + '\',\'conflict\',this)">✕ Has a conflict</button>';
    html += '<button class="status-btn' + (status === 'change' ? ' active-change' : '') + '" onclick="setStatus(\'' + day.id + '\',\'change\',this)">↻ Want to change</button>';
    html += '</div>';
    html += '<textarea placeholder="Comments (optional)..." oninput="updateComment(\'' + day.id + '\',this.value);this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">' + comments + '</textarea>';
    html += '</div>';

    html += '</div>';
  });

  document.getElementById('main-content').innerHTML = html;
}

function setStatus(id, status, btn) {
  var card = document.getElementById('day-' + id);
  var btns = card.querySelectorAll('.status-btn');
  var already = (responses[id] || {}).status === status;
  if (!responses[id]) responses[id] = {};
  card.classList.remove('ok', 'conflict', 'change');
  btns.forEach(function(b) { b.classList.remove('active-ok', 'active-conflict', 'active-change'); });
  if (!already) {
    responses[id].status = status;
    card.classList.add(status);
    btn.classList.add('active-' + status);
  } else {
    responses[id].status = '';
  }
}

function updateComment(id, value) {
  if (!responses[id]) responses[id] = {};
  responses[id].comments = value;
}

function setSaveStatus(msg) { document.getElementById('save-status').textContent = msg; }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function submitAll() {
  setSaveStatus('Saving...');
  var toSave = [];
  SCHEDULE.forEach(function(day) {
    var r = responses[day.id] || {};
    if (!r.status) return;
    toSave.push({
      name: currentUser.name,
      group: currentUser.group,
      day: day.id,
      status: r.status,
      comments: r.comments || ''
    });
  });

  if (toSave.length === 0) { showToast('No responses to save yet!'); setSaveStatus(''); return; }

  var iframe = document.getElementById('hidden-iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.name = 'hidden-iframe';
    iframe.id = 'hidden-iframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }

  var form = document.createElement('form');
  form.method = 'POST';
  form.action = SCRIPT_URL;
  form.target = 'hidden-iframe';
  form.style.display = 'none';

  var input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'payload';
  input.value = JSON.stringify({ type: 'schedule', responses: toSave });
  form.appendChild(input);
  document.body.appendChild(form);

  iframe.onload = function() {
    setSaveStatus('Saved');
    showToast('Responses saved! 🎉');
    setTimeout(function() { loadResponses(); }, 1500);
  };

  form.submit();
  document.body.removeChild(form);
}

    document.getElementById('dash-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  };
  script.onerror = function() {
    delete window[cb];
    try { document.body.removeChild(script); } catch(e) {}
    document.getElementById('dash-inner').innerHTML = '<div class="dash-empty">Could not load — check connection</div>';
  };
  script.src = SCRIPT_URL + '?type=schedule&callback=' + cb + '&t=' + Date.now();
  document.body.appendChild(script);
}

function renderDashboard(responses) {
  // Dedup
  var seen = {};
  var deduped = [];
  responses.forEach(function(r) {
    var key = r.name.trim().toLowerCase() + '|' + r.day;
    if (!seen[key]) { seen[key] = true; deduped.push(r); }
  });

  // Count unique voters
  var voters = {};
  deduped.forEach(function(r) { voters[r.name.trim().toLowerCase()] = true; });
  var voterCount = Object.keys(voters).length;

  // Build map per day
  var dayMap = {};
  deduped.forEach(function(r) {
    if (!dayMap[r.day]) dayMap[r.day] = { ok: 0, conflict: 0, change: 0, total: 0 };
    if (r.status === 'ok') dayMap[r.day].ok++;
    else if (r.status === 'conflict') dayMap[r.day].conflict++;
    else if (r.status === 'change') dayMap[r.day].change++;
    dayMap[r.day].total++;
  });

  // Stats
  var totalOk = deduped.filter(function(r) { return r.status === 'ok'; }).length;
  var totalConflict = deduped.filter(function(r) { return r.status === 'conflict'; }).length;
  var statsHtml = '';
  if (voterCount > 0) statsHtml += '<div class="dash-stat-pill">👥 ' + voterCount + ' responded</div>';
  if (totalOk > 0) statsHtml += '<div class="dash-stat-pill">✓ ' + totalOk + ' works for me</div>';
  if (totalConflict > 0) statsHtml += '<div class="dash-stat-pill">⚠️ ' + totalConflict + ' conflicts</div>';
  document.getElementById('dash-stats').innerHTML = statsHtml;

  if (deduped.length === 0) {
    document.getElementById('dash-inner').innerHTML = '<div class="dash-empty">No responses yet</div>';
    return;
  }

  var html = '';
  SCHEDULE.forEach(function(day) {
    var dm = dayMap[day.id];
    if (!dm) return;
    var total = dm.total;
    var okPct = total ? Math.round((dm.ok / total) * 100) : 0;
    var conflictPct = total ? Math.round((dm.conflict / total) * 100) : 0;
    var changePct = total ? Math.round((dm.change / total) * 100) : 0;

    html += '<div class="dash-day-card">';
    html += '<div class="dash-day-title">' + day.date + ' — ' + day.subtitle + '</div>';
    html += '<div class="dash-counts">';
    html += '<div class="dash-count"><div class="dash-count-dot" style="background:#2a9d8f"></div><span class="dash-count-label">Works for me</span><span class="dash-count-num">&nbsp;' + dm.ok + '</span></div>';
    html += '<div class="dash-count"><div class="dash-count-dot" style="background:#c1440e"></div><span class="dash-count-label">Conflict</span><span class="dash-count-num">&nbsp;' + dm.conflict + '</span></div>';
    html += '<div class="dash-count"><div class="dash-count-dot" style="background:#e9c46a"></div><span class="dash-count-label">Want to change</span><span class="dash-count-num">&nbsp;' + dm.change + '</span></div>';
    html += '</div>';
    html += '<div class="dash-bar-track">';
    html += '<div class="dash-bar-ok" style="width:' + okPct + '%"></div>';
    html += '<div class="dash-bar-conflict" style="width:' + conflictPct + '%"></div>';
    html += '<div class="dash-bar-change" style="width:' + changePct + '%"></div>';
    html += '</div></div>';
  });

  document.getElementById('dash-inner').innerHTML = html;
}

function renderLogistics() {

    var names = t.names.toLowerCase();

    var userFirst = myName.split(' ')[0];

  });

  var groups = ['Frenzels', 'Simmons', 'Barrus'];

    html += '<div class="logistics-group-label">' + grp;

    if (grp === 'Barrus') html += ' · Jun 10–13';

        var d = saved;
        html += '<div class="log-field-grid">';
        html += '<div class="log-field"><div class="log-label">Arrival date</div><input class="log-input" id="log-arrDate-' + t.id + '" placeholder="e.g. Sat Jun 6" value="' + (d.arrDate || t.arrival.date || '') + '" oninput="logField(\'' + t.id + '\',\'arrDate\',this.value)"></div>';
        html += '<div class="log-field"><div class="log-label">Arrival time</div><input class="log-input" id="log-arrTime-' + t.id + '" placeholder="e.g. 4:00 PM" value="' + (d.arrTime || t.arrival.time || '') + '" oninput="logField(\'' + t.id + '\',\'arrTime\',this.value)"></div>';
        html += '<div class="log-field full"><div class="log-label">Travel method</div><input class="log-input" id="log-arrMethod-' + t.id + '" placeholder="Flying, driving, etc." value="' + (d.arrMethod || t.arrival.method || '') + '" oninput="logField(\'' + t.id + '\',\'arrMethod\',this.value)"></div>';
        html += '<div class="log-field full"><div class="log-label">Arrival notes</div><textarea class="log-input log-textarea" id="log-arrNotes-' + t.id + '" placeholder="Flight #, pickup needed, etc." oninput="logField(\'' + t.id + '\',\'arrNotes\',this.value);this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">' + (d.arrNotes || t.arrival.notes || '') + '</textarea></div>';
        html += '<div class="log-field"><div class="log-label">Departure date</div><input class="log-input" id="log-depDate-' + t.id + '" placeholder="e.g. Sat Jun 13" value="' + (d.depDate || t.departure.date || '') + '" oninput="logField(\'' + t.id + '\',\'depDate\',this.value)"></div>';
        html += '<div class="log-field"><div class="log-label">Departure time</div><input class="log-input" id="log-depTime-' + t.id + '" placeholder="e.g. 11:45 PM" value="' + (d.depTime || t.departure.time || '') + '" oninput="logField(\'' + t.id + '\',\'depTime\',this.value)"></div>';
        html += '<div class="log-field full"><div class="log-label">Departure notes</div><textarea class="log-input log-textarea" id="log-depNotes-' + t.id + '" placeholder="Drop-off, carpool, etc." oninput="logField(\'' + t.id + '\',\'depNotes\',this.value);this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">' + (d.depNotes || t.departure.notes || '') + '</textarea></div>';
        html += '</div>';

      } else {
        // Read-only saved data from sheet, or empty
        var d = saved;
        var hasAny = d.arrDate || d.arrTime || d.arrMethod || t.arrival.date || t.arrival.method;
        if (hasAny) {
          html += '<div class="log-field-grid">';
          if (d.arrDate || t.arrival.date) html += '<div class="log-field"><div class="log-label">Arrival date</div><input class="log-input" readonly value="' + (d.arrDate || t.arrival.date || '') + '"></div>';
          if (d.arrTime || t.arrival.time) html += '<div class="log-field"><div class="log-label">Arrival time</div><input class="log-input" readonly value="' + (d.arrTime || t.arrival.time || '') + '"></div>';
          if (d.arrMethod || t.arrival.method) html += '<div class="log-field full"><div class="log-label">Travel method</div><input class="log-input" readonly value="' + (d.arrMethod || t.arrival.method || '') + '"></div>';
          if (d.arrNotes || t.arrival.notes) html += '<div class="log-field full"><div class="log-label">Notes</div><input class="log-input" readonly value="' + (d.arrNotes || t.arrival.notes || '') + '"></div>';
          if (d.depDate || t.departure.date) html += '<div class="log-field"><div class="log-label">Departure date</div><input class="log-input" readonly value="' + (d.depDate || t.departure.date || '') + '"></div>';
          if (d.depTime || t.departure.time) html += '<div class="log-field"><div class="log-label">Departure time</div><input class="log-input" readonly value="' + (d.depTime || t.departure.time || '') + '"></div>';
          html += '</div>';
        } else {
          html += '<div style="font-size:0.8rem;color:var(--muted);padding:8px 0;font-style:italic;">No info submitted yet</div>';
        }
        if (t.arrival.notes && !hasAny) html += '<div style="font-size:0.75rem;color:var(--amber);margin-top:4px;">' + t.arrival.notes + '</div>';
      }

      html += '</div>'; // traveler-body
      html += '</div>'; // traveler-card
    });
  });

  document.getElementById('logistics-content').innerHTML = html;
}

function toggleTraveler(id) {
  var card = document.getElementById('tcard-' + id);
  card.classList.toggle('open');
}

function logField(id, field, value) {
  if (!logisticsData[id]) logisticsData[id] = {};
  logisticsData[id][field] = value;
}

function submitLogistics() {
  var myName = currentUser.name.trim().toLowerCase();
  var myTravelerId = null;
  TRAVELERS.forEach(function(t) {
    var userFirst = myName.split(' ')[0];
    if (t.names.toLowerCase().indexOf(userFirst) !== -1) myTravelerId = t.id;
  });

  if (!myTravelerId) { showToast('Could not find your entry'); return; }

  var d = logisticsData[myTravelerId] || {};
  var payload = {
    type: 'logistics',
    id: myTravelerId,
    names: currentUser.name,
    group: currentUser.group,
    arrDate: d.arrDate || '', arrTime: d.arrTime || '',
    arrMethod: d.arrMethod || '', arrNotes: d.arrNotes || '',
    depDate: d.depDate || '', depTime: d.depTime || '',
    depMethod: d.depMethod || '', depNotes: d.depNotes || ''
  };

  var iframe = document.getElementById('hidden-iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.name = 'hidden-iframe'; iframe.id = 'hidden-iframe'; iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }
  var form = document.createElement('form');
  form.method = 'POST'; form.action = SCRIPT_URL; form.target = 'hidden-iframe'; form.style.display = 'none';
  var input = document.createElement('input');
  input.type = 'hidden'; input.name = 'payload'; input.value = JSON.stringify(payload);
  form.appendChild(input); document.body.appendChild(form);
  iframe.onload = function() { showToast('Travel info saved! 🚗'); setTimeout(function() { loadLogistics(); }, 1200); };
  form.submit();
  document.body.removeChild(form);
}
</script>
